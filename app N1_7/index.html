<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Quiz</title>
  <link rel="stylesheet" href="app.css">
  <script src="app.js" defer></script>
</head>

<body>

<div class="quiz-container">

  <h1>Luyện thi JLPT</h1>

  <div class="score">
    Điểm: <span id="score">0</span>
  </div>

  <h2 id="question">Câu hỏi sẽ hiện ở đây</h2>

  <div id="options"></div>

  <div id="explain-box" class="hidden">
    <p id="explain-content"></p>
    <button id="next-btn" type="button">Câu tiếp theo</button>
  </div>
  
  <div id="question-text"></div>

 <div id="translation-text" style="font-style: italic; color: #555; margin-bottom: 15px;"></div>

 <div id="options-container"></div>
</div>

<div id="pagination" style="margin-top:20px; text-align:center;"></div>
<div class="test-selector">
  <button class="test-btn active" onclick="selectTest(1, this)">Test 1</button>
  <button class="test-btn" onclick="selectTest(2, this)">Test 2</button>
  <button class="test-btn" onclick="selectTest(3, this)">Test 3</button>
  <button class="test-btn" onclick="selectTest(4, this)">Test 4</button>
  <button class="test-btn" onclick="selectTest(5, this)">Test 5</button>
  <button class="test-btn" onclick="selectTest(6, this)">Test 6</button>
  <button class="test-btn" onclick="selectTest(7, this)">Test 7</button>
  <button class="test-btn" onclick="selectTest(8, this)">Test 8</button>
  <button class="test-btn" onclick="selectTest(9, this)">Test 9</button>
  <button class="test-btn" onclick="selectTest(10, this)">Test 10</button>
  <button class="test-btn" onclick="selectTest(11, this)">Test 11</button>
  <button class="test-btn" onclick="selectTest(12, this)">Test 12</button>
  <button class="test-btn" onclick="selectTest(13, this)">Test 13</button>
  <button class="test-btn" onclick="selectTest(14, this)">Test 14</button>
  <button class="test-btn" onclick="selectTest(15, this)">Test 15</button>
  <button class="test-btn" onclick="selectTest(16, this)">Test 16</button>
  <button class="test-btn" onclick="selectTest(17, this)">Test 17</button>
  <button class="test-btn" onclick="selectTest(18, this)">Test 18</button>
  <button class="test-btn" onclick="selectTest(19, this)">Test 19</button>
  <button class="test-btn" onclick="selectTest(20, this)">Test 20</button>
  <button class="test-btn" onclick="selectTest(21, this)">Test 21</button>
</div>

</body>
</html>
